name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write  # OIDC for PyPI trusted publishing
  contents: write  # for GitHub release

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0

      - name: Verify tag matches pyproject.toml version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PYPROJECT_VERSION=$(grep -E '^version' pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match pyproject.toml version $PYPROJECT_VERSION"
            exit 1
          fi

      - name: Build
        run: uv build

      - name: Publish to PyPI
        # v1.14.0 bundles twine 6.x, which validates Metadata-Version 2.4
        # wheels — those are what `uv build` 0.11+ now produces. The earlier
        # v1.10.1 pin bundled twine 5.x and rejected our wheels with
        # "InvalidDistribution: Metadata is missing required fields: Name,
        # Version" (twine 5.x reads Metadata-Version 2.4 as 1.0 and fails
        # required-field checks).
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF#refs/tags/}" \
            --title "Release ${GITHUB_REF#refs/tags/}" \
            --generate-notes
